<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RDO ONE — Markets</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f1a1e;--bg2:#1b2429;--bg3:#273035;
      --border:#273035;--accent:#50d2c1;
      --green:#1fa67d;--red:#ed7088;
      --text:#ffffff;--text2:#c8d2d6;--text3:#878c8f;
      --r:6px;--nav:40px;
    }
    body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:13px;line-height:1.5;min-height:100vh}
    a{color:inherit;text-decoration:none}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

    /* ─── Nav ─────────────────────────────────────────────────────────── */
    #rdo-nav{position:fixed;top:0;left:0;right:0;height:var(--nav);background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 16px;z-index:1000}
    .nav-logo{font-size:13px;font-weight:800;letter-spacing:.5px;color:#f5f1ea;flex-shrink:0}
    .nav-logo span{color:var(--accent)}
    .nav-div{width:1px;height:18px;background:var(--border);margin:0 4px;flex-shrink:0}
    #rdo-nav a{font-size:12px;font-weight:500;color:var(--text3);padding:4px 10px;border-radius:4px;transition:color .12s,background .12s;flex-shrink:0}
    #rdo-nav a:hover{color:var(--text);background:var(--bg2)}
    #rdo-nav a.active{color:var(--accent)}

    /* ─── Ticker ───────────────────────────────────────────────────────── */
    .ticker-wrap{margin-top:var(--nav);overflow:hidden;background:var(--bg2);border-bottom:1px solid var(--border);height:34px;display:flex;align-items:center}
    .ticker-track{display:inline-flex;gap:28px;padding:0 20px;white-space:nowrap;animation:scroll 90s linear infinite}
    .ticker-track:hover{animation-play-state:paused}
    .t-item{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;flex-shrink:0;cursor:pointer}
    .t-item:hover .t-sym{color:var(--text)}
    .t-sym{color:var(--text3);transition:color .1s}
    .t-px{color:var(--text);font-variant-numeric:tabular-nums;min-width:7ch;display:inline-block;text-align:right}
    .t-ch{font-variant-numeric:tabular-nums;min-width:5ch;display:inline-block}
    .up{color:var(--green)}.dn{color:var(--red)}
    @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

    /* ─── Layout ───────────────────────────────────────────────────────── */
    main{max-width:1440px;margin:0 auto;padding:20px 16px 40px}
    h1{font-size:18px;font-weight:700;letter-spacing:-.03em;margin-bottom:16px}

    /* ─── Stat cards ───────────────────────────────────────────────────── */
    .stat-top{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
    .big-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px}
    .bc-left{display:flex;flex-direction:column;gap:4px;min-width:0}
    .bc-val{font-size:22px;font-weight:700;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
    .bc-lbl{font-size:11px;color:var(--text3);font-weight:500;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
    .bc-ch{font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
    .bc-spark{flex-shrink:0;width:120px;height:44px;overflow:hidden}
    .bc-spark svg{width:100%;height:100%;display:block}
    .small-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .small-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
    .sc-val{font-size:20px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
    .sc-lbl{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500}

    /* ─── Market Statistics ─────────────────────────────────────────────── */
    .mkt-stats-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
    .mkt-stats-hdr{padding:10px 16px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text3);text-transform:uppercase}
    .mst-row{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-bottom:1px solid var(--border)}
    .mst-row:last-child{border-bottom:none}
    .mst-lbl{font-size:12px;color:var(--text3)}
    .mst-val{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;font-variant-numeric:tabular-nums}
    .mst-ch{font-size:11px;font-weight:600}

    /* ─── Panels row ───────────────────────────────────────────────────── */
    .panels{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    @media(max-width:640px){.panels{grid-template-columns:1fr}}
    .panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    .panel-hdr{padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text3)}
    .prow{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;cursor:pointer;transition:background .1s}
    .prow:hover{background:var(--bg3)}
    .prow-l{display:flex;align-items:center;gap:8px;min-width:0}
    .coin-img{width:22px;height:22px;border-radius:50%;object-fit:cover;flex-shrink:0}
    .coin-nm{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .coin-sy{font-size:10px;color:var(--text3)}
    .prow-r{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;gap:2px}
    .p-price{font-size:11px;font-variant-numeric:tabular-nums}
    .p-pct{font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
    .rank-badge{width:18px;height:18px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--text3);flex-shrink:0}

    /* ─── Table ────────────────────────────────────────────────────────── */
    .tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
    .tbl-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border)}
    .tbl-title{font-size:13px;font-weight:600}
    .tbl-ts{font-size:11px;color:var(--text3)}
    table{width:100%;border-collapse:collapse}
    th{padding:8px 10px;text-align:right;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);white-space:nowrap;border-bottom:1px solid var(--border)}
    th.l{text-align:left}
    td{padding:9px 10px;border-top:1px solid var(--border)}
    tr.coin-row{cursor:pointer;transition:background .1s}
    tr.coin-row:hover{background:var(--bg3)}
    .td-r{text-align:right;font-size:11px;font-variant-numeric:tabular-nums;color:var(--text2)}
    .td-nm{display:flex;align-items:center;gap:8px}
    .td-nm-n{font-size:12px;font-weight:600}
    .td-nm-s{font-size:10px;color:var(--text3)}
    .td-px{text-align:right;font-size:12px;font-weight:600;font-variant-numeric:tabular-nums}
    .badge{display:inline-flex;align-items:center;gap:2px;padding:2px 5px;border-radius:3px;font-size:10px;font-weight:600;font-variant-numeric:tabular-nums}
    .badge.up{background:rgba(31,166,125,.15);color:var(--green)}
    .badge.dn{background:rgba(237,112,136,.15);color:var(--red)}

    /* ─── Converter ────────────────────────────────────────────────────── */
    .conv-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
    .conv-body{padding:16px;display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}
    @media(max-width:600px){.conv-body{grid-template-columns:1fr;}.conv-arrow{display:none}}
    .conv-side{display:flex;gap:6px;align-items:center}
    .conv-input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 10px;border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;font-variant-numeric:tabular-nums;min-width:0}
    .conv-input:focus{border-color:var(--accent)}
    .conv-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 8px;border-radius:var(--r);font-size:11px;font-family:inherit;outline:none;cursor:pointer;min-width:64px}
    .conv-arrow{font-size:20px;color:var(--text3);text-align:center}
    .conv-result{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 10px;border-radius:var(--r);font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;min-width:0}

    /* ─── Skeleton ──────────────────────────────────────────────────────── */
    .sk{background:var(--bg3);border-radius:3px;animation:pulse 1.5s ease-in-out infinite;display:inline-block}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

    /* ─── Empty/load states ─────────────────────────────────────────────── */
    .loading-rows{padding:20px;text-align:center;color:var(--text3);font-size:12px}
  </style>
</head>

<!-- ─── Nav ──────────────────────────────────────────────────────────────── -->
<nav id="rdo-nav">
  <div class="nav-logo">RDO<span>ONE</span></div>
  <div class="nav-div"></div>
  <a href="/">Trade</a>
  <a href="/markets.html" class="active">Markets</a>
  <a href="/news.html">News</a>
  <a href="/portfolio.html">Portfolio</a>
</nav>

<!-- ─── Ticker bar ────────────────────────────────────────────────────────── -->
<div class="ticker-wrap">
  <div class="ticker-track" id="ticker"></div>
</div>

<!-- ─── Main ─────────────────────────────────────────────────────────────── -->
<main>
  <h1>Market Overview</h1>

  <!-- Stat cards -->
  <div class="stat-top">
    <div class="big-card">
      <div class="bc-left">
        <div class="bc-val" id="s-mcap">—</div>

<script>
// ─── Config ────────────────────────────────────────────────────────────────
const SYMS = ['BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','XRPUSDT','DOGEUSDT','ADAUSDT','AVAXUSDT','LINKUSDT','DOTUSDT','POLUSDT','UNIUSDT','LTCUSDT','ATOMUSDT','NEARUSDT','APTUSDT','ARBUSDT','OPUSDT','INJUSDT','SUIUSDT','TIAUSDT','JUPUSDT','WIFUSDT','BONKUSDT','PEPEUSDT'];
const LABEL = {BTCUSDT:'BTC',ETHUSDT:'ETH',SOLUSDT:'SOL',BNBUSDT:'BNB',XRPUSDT:'XRP',DOGEUSDT:'DOGE',ADAUSDT:'ADA',AVAXUSDT:'AVAX',LINKUSDT:'LINK',DOTUSDT:'DOT',POLUSDT:'POL',UNIUSDT:'UNI',LTCUSDT:'LTC',ATOMUSDT:'ATOM',NEARUSDT:'NEAR',APTUSDT:'APT',ARBUSDT:'ARB',OPUSDT:'OP',INJUSDT:'INJ',SUIUSDT:'SUI',TIAUSDT:'TIA',JUPUSDT:'JUP',WIFUSDT:'WIF',BONKUSDT:'BONK',PEPEUSDT:'PEPE'};
const CG_TTL = 70_000;

// ─── State ─────────────────────────────────────────────────────────────────
const cgCache = {};
let coins = [];
let tickerData = {};
let globalData = null;

// ─── Helpers ───────────────────────────────────────────────────────────────
function el(id) { return document.getElementById(id); }
function set(id, v) { const e = el(id); if (e) e.textContent = v; }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function fmtLarge(n) {
  if (!isFinite(n) || n === null) return '—';
  if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return '$' + (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6)  return '$' + (n / 1e6).toFixed(2) + 'M';
  return '$' + n.toLocaleString('en-US');
}

function fmtPx(n) {
  if (!isFinite(n) || n === null) return '—';
  if (n >= 10000) return '$' + n.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
  if (n >= 1000)  return '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  if (n >= 1)     return '$' + n.toFixed(4);
  if (n >= 0.001) return '$' + n.toFixed(5);
  return '$' + n.toFixed(8);
}

function fmtPct(v) {
  if (!isFinite(v) || v === null) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}

function pCls(v) { return (v ?? 0) >= 0 ? 'up' : 'dn'; }

function fgColor(v) {
  const n = parseInt(v, 10);
  if (n <= 25) return '#ed7088';
  if (n <= 45) return '#f97316';
  if (n <= 55) return '#eab308';
  if (n <= 75) return '#50d2c1';
  return '#1fa67d';
}

// ─── CoinGecko fetch w/ cache ───────────────────────────────────────────────
async function cgFetch(path) {
  const now = Date.now();
  const hit = cgCache[path];
  if (hit && now - hit.ts < CG_TTL) return hit.data;
  try {
    const res = await fetch('/coingecko' + path);
    if (!res.ok) return null;
    const data = await res.json();
    if (!data?.status?.error_code) cgCache[path] = { data, ts: now };
    return data;
  } catch { return null; }
}

// ─── Ticker bar ─────────────────────────────────────────────────────────────
function buildTicker() {
  const html = SYMS.map(s => `
    <span class="t-item t-${s}">
      <span class="t-sym">${LABEL[s]}</span>
      <span class="t-px">—</span>
      <span class="t-ch">—</span>
    </span>`).join('');
  el('ticker').innerHTML = html + html; // duplicate for seamless loop
}

async function fetchTicker() {
  try {
    const symsParam = encodeURIComponent(JSON.stringify(SYMS));
    const res = await fetch(`/binance/api/v3/ticker/24hr?symbols=${symsParam}`);
    if (!res.ok) return;
    const data = await res.json();
    if (!Array.isArray(data)) return;
    data.forEach(t => {
      const px = parseFloat(t.lastPrice);
      const ch = parseFloat(t.priceChangePercent);
      if (!isFinite(px)) return;
      tickerData[t.symbol] = { px, ch };
      document.querySelectorAll(`.t-${t.symbol}`).forEach(item => {
        const pxEl = item.querySelector('.t-px');
        const chEl = item.querySelector('.t-ch');
        if (pxEl) pxEl.textContent = fmtPx(px);
        if (chEl) { chEl.textContent = ' ' + fmtPct(ch); chEl.className = 't-ch ' + pCls(ch); }
      });
    });
  } catch {}
}

// ─── Sparkline ───────────────────────────────────────────────────────────────
function makeSpark(rawPts, color) {
  // Downsample to ~40 points for performance
  const step = Math.max(1, Math.floor(rawPts.length / 40));
  const pts  = rawPts.filter((_, i) => i % step === 0);
  if (pts.length < 2) return '';
  const vals = pts.map(p => p[1]);
  const min  = Math.min(...vals), max = Math.max(...vals);
  const rng  = max - min || 1;
  const W = 120, H = 44;
  const px = i  => (i / (pts.length - 1)) * W;
  const py = v  => H - ((v - min) / rng) * H * 0.8 - H * 0.1;
  const linePts = pts.map((p, i) => `${px(i).toFixed(1)},${py(p[1]).toFixed(1)}`).join(' ');
  const lastX = px(pts.length - 1).toFixed(1);
  const areaD = `M 0,${py(pts[0][1]).toFixed(1)} ` +
    pts.slice(1).map((p, i) => `L ${px(i+1).toFixed(1)},${py(p[1]).toFixed(1)}`).join(' ') +
    ` L ${lastX},${H} L 0,${H} Z`;
  const gId = 'sg' + Math.random().toString(36).slice(2,6);
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="${gId}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${areaD}" fill="url(#${gId})"/>
    <polyline points="${linePts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

async function fetchSparklines() {
  try {
    // BTC 4h klines as market direction proxy (42 candles = 7 days)
    const res = await fetch('/binance/api/v3/klines?symbol=BTCUSDT&interval=4h&limit=42');
    if (!res.ok) return;
    const klines = await res.json();
    // [index, close] and [index, quote_volume]
    const mcPts  = klines.map((k, i) => [i, parseFloat(k[4])]);
    const volPts = klines.map((k, i) => [i, parseFloat(k[7])]);
    // BTC price change: last close vs 6 candles ago (6×4h = 24h)
    const mcLast  = mcPts[mcPts.length - 1][1];
    const mc24ago = mcPts[Math.max(0, mcPts.length - 7)][1];
    const mcPct   = mc24ago ? ((mcLast - mc24ago) / mc24ago) * 100 : 0;
    // Volume change: sum last 6 candles vs prior 6 candles (24h vs prior 24h)
    const last6Vol = volPts.slice(-6).reduce((s, p) => s + p[1], 0);
    const prev6Vol = volPts.slice(-12, -6).reduce((s, p) => s + p[1], 0);
    const volPct   = prev6Vol ? ((last6Vol - prev6Vol) / prev6Vol) * 100 : 0;
    const mcColor  = mcPct  >= 0 ? '#1fa67d' : '#ed7088';
    const volColor = volPct >= 0 ? '#1fa67d' : '#ed7088';
    const mcChEl  = el('s-mcap-ch');
    const volChEl = el('s-vol-ch');
    if (mcChEl)  { mcChEl.textContent  = fmtPct(mcPct);  mcChEl.className  = 'bc-ch ' + pCls(mcPct); }
    if (volChEl) { volChEl.textContent = fmtPct(volPct); volChEl.className = 'bc-ch ' + pCls(volPct); }
    const smEl = el('spark-mcap');
    const svEl = el('spark-vol');
    if (smEl) smEl.innerHTML = makeSpark(mcPts,  mcColor);
    if (svEl) svEl.innerHTML = makeSpark(volPts, volColor);
  } catch {}
}

// ─── Market Statistics ────────────────────────────────────────────────────────
function renderMarketStats() {
  const btc  = tickerData['BTCUSDT'];
  const eth  = tickerData['ETHUSDT'];
  const d    = globalData;
  const c0   = coins[0]; // BTC from CoinGecko (market cap sorted)
  const rows = [
    ['BTC Price',       btc ? fmtPx(btc.px)   : '—', btc ? fmtPct(btc.ch)   : null, btc ? pCls(btc.ch)  : ''],
    ['ETH Price',       eth ? fmtPx(eth.px)   : '—', eth ? fmtPct(eth.ch)   : null, eth ? pCls(eth.ch)  : ''],
    ['BTC Market Cap',  c0  ? fmtLarge(c0.market_cap)   : '—', null, ''],
    ['BTC 24h Volume',  c0  ? fmtLarge(c0.total_volume)  : '—', null, ''],
    ['Total Market Cap',d   ? fmtLarge(d.total_market_cap?.usd ?? 0) : '—',
                        d   ? fmtPct(d.market_cap_change_percentage_24h_usd ?? 0) : null,
                        d   ? pCls(d.market_cap_change_percentage_24h_usd ?? 0) : ''],
    ['BTC Dominance',   d   ? (d.market_cap_percentage?.btc ?? 0).toFixed(1) + '%' : '—', null, ''],
    ['Total Volume 24h',d   ? fmtLarge(d.total_volume?.usd ?? 0) : '—', null, ''],
  ];
  const body = el('mkt-stats-body');
  if (!body) return;
  body.innerHTML = rows.map(([lbl, val, ch, cls]) => `
    <div class="mst-row">
      <span class="mst-lbl">${lbl}</span>
      <span class="mst-val">${val}${ch ? `<span class="mst-ch ${cls}">${ch}</span>` : ''}</span>
    </div>`).join('');
}

// ─── Global stats + Fear & Greed ───────────────────────────────────────────
async function fetchGlobal() {
  const [gj, fgj] = await Promise.allSettled([
    cgFetch('/api/v3/global'),
    fetch('/feargreed/fng/?limit=1').then(r => r.json()),
  ]);
  const d = gj.status === 'fulfilled' ? gj.value?.data : null;
  if (d) {
    globalData = d;
    const mcap = d.total_market_cap?.usd ?? 0;
    const vol  = d.total_volume?.usd ?? 0;
    const dom  = d.market_cap_percentage?.btc ?? 0;
    set('s-mcap', fmtLarge(mcap));
    set('s-vol',  fmtLarge(vol));
    set('s-btc',  dom.toFixed(1) + '%');
    renderMarketStats();
  }
  const fg = fgj.status === 'fulfilled' ? fgj.value?.data?.[0] : null;
  if (fg) {
    const fgEl = el('s-fg');
    if (fgEl) { fgEl.textContent = fg.value; fgEl.style.color = fgColor(fg.value); }
    set('s-fg-l', fg.value_classification + ' (' + fg.value + ')');
  }
}

// ─── Trending ───────────────────────────────────────────────────────────────
async function fetchTrending() {
  const json = await cgFetch('/api/v3/search/trending');
  if (!json?.coins) return;
  const items = json.coins.slice(0, 7).map(c => c.item);
  el('trending').innerHTML = items.map((c, i) => {
    const ch  = c.data?.price_change_percentage_24h?.usd ?? 0;
    const px  = c.data?.price ?? 0;
    const sym = c.symbol.toUpperCase() + 'USDT';
    return `<div class="prow" >
      <div class="prow-l">
        <div class="rank-badge">${i + 1}</div>
        <img class="coin-img" src="${c.small || c.thumb}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
        <div>
          <div class="coin-nm">${c.name}</div>
          <div class="coin-sy">${c.symbol.toUpperCase()}</div>
        </div>
      </div>
      <div class="prow-r">
        ${px > 0 ? `<div class="p-price">${fmtPx(px)}</div>` : ''}
        <div class="p-pct ${pCls(ch)}">${fmtPct(ch)}</div>
      </div>
    </div>`;
  }).join('');
}

// ─── Coins (top 50, used for table + gainers + converter) ──────────────────
async function fetchCoins() {
  const json = await cgFetch('/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=50&page=1&sparkline=false&price_change_percentage=7d,24h');
  if (!Array.isArray(json)) return;

  coins = json.slice(0, 20);

  // Top gainers from full 50
  const gainers = [...json]
    .filter(c => (c.price_change_percentage_24h ?? 0) > 0)
    .sort((a, b) => (b.price_change_percentage_24h ?? 0) - (a.price_change_percentage_24h ?? 0))
    .slice(0, 7);

  el('gainers').innerHTML = gainers.map(c => {
    const ch  = c.price_change_percentage_24h ?? 0;
    const sym = c.symbol.toUpperCase() + 'USDT';
    return `<div class="prow" >
      <div class="prow-l">
        <img class="coin-img" src="${c.image}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
        <div>
          <div class="coin-nm">${c.name}</div>
          <div class="coin-sy">${c.symbol.toUpperCase()}</div>
        </div>
      </div>
      <div class="prow-r">
        <div class="p-price">${fmtPx(c.current_price)}</div>
        <div class="p-pct up">${fmtPct(ch)}</div>
      </div>
    </div>`;
  }).join('');

  renderTable();
  buildConverter(json.slice(0, 12));
  set('tbl-ts', 'Updated ' + new Date().toLocaleTimeString());
  renderMarketStats();
}

// ─── Coins table ────────────────────────────────────────────────────────────
function renderTable() {
  if (!coins.length) return;
  el('coins-tbl').innerHTML = `<table>
    <thead><tr>
      <th class="l" style="width:32px">#</th>
      <th class="l">Name</th>
      <th>Price</th>
      <th>24h %</th>
      <th>7d %</th>
      <th>Market Cap</th>
      <th>Volume (24h)</th>
    </tr></thead>
    <tbody>${coins.map(c => {
      const ch24 = c.price_change_percentage_24h ?? 0;
      const ch7d = c.price_change_percentage_7d_in_currency ?? 0;
      const sym  = c.symbol.toUpperCase() + 'USDT';
      return `<tr class="coin-row" >
        <td style="color:var(--text3);font-size:11px">${c.market_cap_rank}</td>
        <td>
          <div class="td-nm">
            <img src="${c.image}" alt="" width="22" height="22" style="border-radius:50%;object-fit:cover;flex-shrink:0" loading="lazy" onerror="this.style.visibility='hidden'">
            <div>
              <div class="td-nm-n">${c.name}</div>
              <div class="td-nm-s">${c.symbol.toUpperCase()}</div>
            </div>
          </div>
        </td>
        <td class="td-px">${fmtPx(c.current_price)}</td>
        <td class="td-r"><span class="badge ${pCls(ch24)}">${ch24 >= 0 ? '▲' : '▼'} ${Math.abs(ch24).toFixed(2)}%</span></td>
        <td class="td-r"><span class="badge ${pCls(ch7d)}">${ch7d >= 0 ? '▲' : '▼'} ${Math.abs(ch7d).toFixed(2)}%</span></td>
        <td class="td-r">${fmtLarge(c.market_cap)}</td>
        <td class="td-r">${fmtLarge(c.total_volume)}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

// ─── Converter ───────────────────────────────────────────────────────────────
function buildConverter(list) {
  const fromSel = el('cv-from');
  const toSel   = el('cv-to');
  if (!fromSel || !toSel) return;
  const opts = list.map(c => `<option value="${c.id}" data-px="${c.current_price}">${c.symbol.toUpperCase()}</option>`).join('');
  fromSel.innerHTML = opts;
  toSel.innerHTML   = '<option value="__usd" data-px="1">USD</option>' + opts;
  const compute = () => {
    const amt    = parseFloat(el('cv-amt').value || '0') || 0;
    const fromPx = parseFloat(fromSel.selectedOptions[0]?.dataset.px || '0');
    const toPx   = parseFloat(toSel.selectedOptions[0]?.dataset.px || '1') || 1;
    const result = (amt * fromPx) / toPx;
    const rEl    = el('cv-result');
    if (rEl) rEl.textContent = isFinite(result) ? (result >= 1000 ? result.toLocaleString('en-US', {maximumFractionDigits: 2}) : result.toFixed(result >= 1 ? 4 : 8)) : '—';
  };
  el('cv-amt').addEventListener('input', compute);
  fromSel.addEventListener('change', compute);
  toSel.addEventListener('change', compute);
  compute();
}

// ─── Init ────────────────────────────────────────────────────────────────────
async function init() {
  buildTicker();

  // Stagger fetches to respect CoinGecko rate limits
  fetchTicker();
  await delay(200);
  fetchGlobal();
  await delay(600);
  fetchCoins();
  await delay(600);
  fetchTrending();
  await delay(600);
  fetchSparklines();

  // Refresh intervals
  setInterval(fetchTicker, 30_000);
  setInterval(fetchGlobal, 120_000);
  setInterval(async () => { await delay(300); fetchCoins(); }, 90_000);
  setInterval(async () => { await delay(600); fetchTrending(); }, 120_000);
}

init();
</script>
